# FlossWare NetBeans Plugins - Logging Configuration
# This file configures java.util.logging for all NetBeans plugin modules
# Place this file in the NetBeans configuration directory or module classpath

# Set the default logging level
.level=INFO

# Configure handlers
handlers=java.util.logging.ConsoleHandler

# FlossWare plugin loggers - set appropriate levels per module
org.flossware.netbeans.level=INFO
org.flossware.netbeans.ai.level=INFO
org.flossware.netbeans.ai.core.level=INFO
org.flossware.netbeans.ai.core.api.level=FINE
org.flossware.netbeans.ai.core.validation.level=FINE
org.flossware.netbeans.claude.level=INFO
org.flossware.netbeans.claude.api.level=FINE
org.flossware.netbeans.chatgpt.level=INFO
org.flossware.netbeans.gemini.level=INFO
org.flossware.netbeans.grok.level=INFO
org.flossware.netbeans.mistral.level=INFO
org.flossware.netbeans.perplexity.level=INFO
org.flossware.netbeans.cohere.level=INFO
org.flossware.netbeans.deepseek.level=INFO
org.flossware.netbeans.openrouter.level=INFO

# Language plugins
org.flossware.netbeans.python.level=INFO
org.flossware.netbeans.javascript.level=INFO
org.flossware.netbeans.typescript.level=INFO
org.flossware.netbeans.go.level=INFO
org.flossware.netbeans.rust.level=INFO
org.flossware.netbeans.csharp.level=INFO
org.flossware.netbeans.groovy.level=INFO
org.flossware.netbeans.bash.level=INFO
org.flossware.netbeans.kotlin.level=INFO

# Console handler configuration
java.util.logging.ConsoleHandler.level=INFO
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter

# Format log messages: timestamp - level - logger name - message
java.util.logging.SimpleFormatter.format=[%1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS] %4$s: %2$s - %5$s%6$s%n
